<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Kamu 💖</title>

<style>
body {
    margin: 0;
    background: #222;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.phone {
    width: 414px;
    height: 896px;
    background: linear-gradient(135deg, #ffe4e1, #ffc0cb);
    border-radius: 40px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
}

.page {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    opacity: 0;
    transform: translateX(50px) scale(0.95);
    transition: 0.6s;
    pointer-events: none;
}

.page.active {
    opacity: 1;
    transform: translateX(0) scale(1);
    pointer-events: auto;
}

h1, p {
    color: #c71585;
    text-align: center;
    padding: 0 20px;
}

.nav-left, .nav-right {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    padding: 10px;
}

.nav-left { left: 15px; }
.nav-right { right: 15px; }

button {
    width: 25px;
    height: 25px;
    border-radius: 50%;
    border: none;
    background: rgba(255, 105, 180, 0.85);
    backdrop-filter: blur(10px);
    color: white;
    font-size: 10px;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    transition: 0.2s;
}

button:hover { transform: scale(1.15); }
button:active { transform: scale(0.9); }

.grid, .video-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 90%;
}

.grid img, .video-grid video {
    width: 100%;
    border-radius: 15px;
}

/* HEART */
.heart {
    position: absolute;
    top: -10px;
    animation: fall 3s linear forwards;
}
@keyframes fall {
    to { transform: translateY(900px); }
}

/* SPARKLE */
@keyframes sparkleFade {
    to {
        opacity: 0;
        transform: translateY(-20px) scale(1.5);
    }
}

/* CONFETTI */
.confetti {
    position: absolute;
    width: 8px;
    height: 8px;
    top: -10px;
    animation: confettiFall 3s linear forwards;
}
@keyframes confettiFall {
    to {
        transform: translateY(900px) rotate(720deg);
    }
}
</style>
</head>

<body>

<div class="phone">

<audio id="lagu" loop autoplay>
<source src="musik.mp3">
</audio>

<!-- PAGE 1 -->
<div class="page active" id="page1">
    <h1 class="typing" data-text="Hai Bebeyy 💖"></h1>
    <p class="typing" data-text="Aku punya sesuatu buat bebeyy..."></p>

    <div style="margin-top:20px;">
        <button onclick="nextPage()"> 🤍</button>
    </div>
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
    <h1 class="typing" data-text="Our Picture 📸"></h1>
    <div class="grid">
        <img src="Foto 1.jpg">
        <img src="Foto 2.jpg">
        <img src="Foto 3.jpg">
        <img src="Foto 4.jpg">
    </div>

    <div class="nav-left"><button onclick="prevPage()">⬅️</button></div>
    <div class="nav-right"><button onclick="nextPage()">➡️</button></div>
</div>

<!-- PAGE 3 -->
<div class="page" id="page3">
    <h1 class="typing" data-text="Our Moment 🎥"></h1>
    <div class="video-grid">
        <video autoplay muted loop><source src="Video 1.mp4"></video>
        <video autoplay muted loop><source src="Video 2.mp4"></video>
    </div>

    <div class="nav-left"><button onclick="prevPage()">⬅️</button></div>
    <div class="nav-right"><button onclick="nextPage()">➡️</button></div>
</div>

<!-- PAGE 4 -->
<div class="page" id="page4">
    <h1 class="typing" data-text="Untuk Kamu 💌"></h1>
    <p class="typing" data-text="Terima kasih sudah hadir di hidupku."></p>
    <p class="typing" data-text="With you everything is better ❤️"></p>

    <div class="nav-left"><button onclick="prevPage()">⬅️</button></div>
    <div class="nav-right"><button onclick="nextPage()">➡️</button></div>
</div>

<!-- PAGE 5 -->
<div class="page" id="page5">
    <h1 class="typing" data-text="Happy Anniversary 🎉"></h1>
    <p class="typing" data-text="Aku sayang kamu 💗"></p>

    <div class="nav-left"><button onclick="prevPage()">⬅️</button></div>
    <div class="nav-right"><button onclick="restart()">🔁</button></div>
</div>

</div>

<script>
let currentPage = 1;
const totalPages = 5;

/* AUTO PLAY MUSIC */
window.addEventListener("load", () => {
    const audio = document.getElementById("lagu");
    audio.currentTime = 110;

    const playPromise = audio.play();

    if (playPromise !== undefined) {
        playPromise.catch(() => {
            document.body.addEventListener("click", () => {
                audio.play();
            }, { once: true });
        });
    }
});

/* NAV */
function showPage(p){
    document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
    document.getElementById('page'+p).classList.add('active');
    startTypingPage();

    if(p===5) confetti();
}

function nextPage(){
    if(currentPage<totalPages){
        currentPage++;
        showPage(currentPage);
    }
}

function prevPage(){
    if(currentPage>1){
        currentPage--;
        showPage(currentPage);
    }
}

function restart(){
    currentPage=1;
    showPage(currentPage);
}

/* TYPING BERGILIR */
function startTypingPage(){
    const elements=document.querySelectorAll('#page'+currentPage+' .typing');
    let iEl=0;

    function typeNext(){
        if(iEl>=elements.length) return;

        const el=elements[iEl];
        const text=el.getAttribute('data-text');
        el.innerHTML="";
        let i=0;

        function typeChar(){
            if(i<text.length){
                el.innerHTML+=text[i];
                i++;
                let delay=35;
                if(text[i]==','||text[i]=='.') delay=200;
                setTimeout(typeChar,delay);
            } else {
                iEl++;
                setTimeout(typeNext,400);
            }
        }
        typeChar();
    }
    typeNext();
}

/* HEART */
setInterval(()=>{
    const h=document.createElement('div');
    h.className='heart';
    h.innerText='💗';
    h.style.left=Math.random()*100+'%';
    document.querySelector('.phone').appendChild(h);
    setTimeout(()=>h.remove(),3000);
},400);

/* SPARKLE */
document.addEventListener("click",(e)=>{
    const s=document.createElement("div");
    s.innerHTML="✨";
    s.style.position="absolute";
    s.style.left=e.clientX+"px";
    s.style.top=e.clientY+"px";
    s.style.animation="sparkleFade 1s forwards";
    document.querySelector('.phone').appendChild(s);
    setTimeout(()=>s.remove(),1000);
});

/* INIT */
startTypingPage();
</script>

</body>
</html>
